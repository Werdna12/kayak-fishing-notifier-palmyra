name: Daily Kayak Fishing Check (4pm AWST)

on:
  schedule:
    - cron: '0 8 * * *'   # 4:00 PM AWST
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Cache notified state
        uses: actions/cache@v4
        with:
          path: notified_weekends.json
          key: kayak-notifier-state
          restore-keys: |
            kayak-notifier-state

      - name: Run kayak fishing notifier
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python kayak_fishing_notifier.py
